<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="860" height="480" fill="#f8fafc" rx="12"/>
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Workflow 2 — Agent KB Assist</text>
  <rect x="180" y="60" width="500" height="60" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="430" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#3b0764">Agent clicks "KB Suggestions" on a ticket</text>
  <text x="430" y="106" text-anchor="middle" font-size="11" fill="#5b21b6">KBSuggestionsModal opens · ticket data already in props</text>
  <line x1="430" y1="120" x2="430" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="180" y="148" width="500" height="60" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="430" y="172" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">POST /api/knowledge/search-kb</text>
  <text x="430" y="194" text-anchor="middle" font-size="11" fill="#1d4ed8">Sends ticket.title + ticket.description · same endpoint as customer search</text>
  <line x1="430" y1="208" x2="430" y2="236" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="180" y="236" width="500" height="60" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="430" y="260" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Exact same search pipeline runs</text>
  <text x="430" y="282" text-anchor="middle" font-size="11" fill="#1d4ed8">Keywords — tags — Atlas Search — Jaccard — re-rank — confidence</text>
  <line x1="430" y1="296" x2="430" y2="324" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="180" y="324" width="500" height="60" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="430" y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Modal shows KB articles</text>
  <text x="430" y="370" text-anchor="middle" font-size="11" fill="#166534">Title · solution steps · match % badge · tag pills · feedback buttons</text>
  <line x1="430" y1="384" x2="430" y2="412" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="180" y="412" width="500" height="52" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="430" y="432" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">Why agent input works better than customer input</text>
  <text x="430" y="452" text-anchor="middle" font-size="11" fill="#92400e">Ticket data is structured text — cleaner keyword extraction, more precise tag matching</text>
</svg>