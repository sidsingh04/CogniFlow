<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 740" width="860" height="740" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arr-exit" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="860" height="740" fill="#f8fafc" rx="12"/>
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Workflow 4 — Tag Normalisation Pipeline</text>
  <rect x="160" y="60" width="530" height="44" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="425" y="77" text-anchor="middle" font-size="12" font-weight="600" fill="#3b0764">Raw tags from agent</text>
  <text x="425" y="96" text-anchor="middle" font-size="11" fill="#5b21b6">"Blutooth"  ·  "  KEYBOARD  "  ·  "periferal"  ·  "hardware"</text>
  <line x1="425" y1="104" x2="425" y2="124" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="124" width="530" height="76" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="425" y="146" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Stage 0 — Normalise</text>
  <text x="425" y="165" text-anchor="middle" font-size="11" fill="#334155">trim()  +  toLowerCase()</text>
  <text x="425" y="183" text-anchor="middle" font-size="11" fill="#64748b">Solves: capitalisation, whitespace  ·  Cost: zero (JS string op)</text>
  <line x1="425" y1="200" x2="425" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="150" y="167" text-anchor="end" font-size="10" fill="#94a3b8">free</text>
  <rect x="160" y="220" width="530" height="76" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="425" y="242" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Stage 1 — Exact match</text>
  <text x="425" y="261" text-anchor="middle" font-size="11" fill="#1d4ed8">findOne({ canonicalTag or aliases: cleanTag, status: "approved" })</text>
  <text x="425" y="279" text-anchor="middle" font-size="11" fill="#64748b">Solves: known tags, known aliases  ·  Cost: 1 indexed DB query</text>
  <line x1="690" y1="258" x2="760" y2="258" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-exit)"/>
  <rect x="762" y="238" width="82" height="40" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="803" y="255" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">EXIT</text>
  <text x="803" y="269" text-anchor="middle" font-size="10" fill="#166534">if matched</text>
  <line x1="425" y1="296" x2="425" y2="316" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="435" y="310" font-size="10" fill="#94a3b8">no match</text>
  <text x="150" y="263" text-anchor="end" font-size="10" fill="#2563eb">free</text>
  <rect x="160" y="316" width="530" height="88" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="425" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">Stage 2 — Fuzzy match (Atlas Search BK-tree)</text>
  <text x="425" y="357" text-anchor="middle" font-size="11" fill="#92400e">$search  ·  fuzzy: { maxEdits: 1, prefixLength: 2 }</text>
  <text x="425" y="375" text-anchor="middle" font-size="11" fill="#92400e">"blutooth" to "bluetooth"  ·  "netwrok" to "network"</text>
  <text x="425" y="393" text-anchor="middle" font-size="11" fill="#64748b">Cost: Atlas index traversal, no API  ·  Side effect: variant added to aliases</text>
  <line x1="690" y1="360" x2="760" y2="360" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-exit)"/>
  <rect x="762" y="340" width="82" height="40" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="803" y="357" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">EXIT</text>
  <text x="803" y="371" text-anchor="middle" font-size="10" fill="#166534">if matched</text>
  <line x1="425" y1="404" x2="425" y2="424" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="435" y="418" font-size="10" fill="#94a3b8">no match</text>
  <text x="150" y="363" text-anchor="end" font-size="10" fill="#d97706">free</text>
  <rect x="160" y="424" width="530" height="88" rx="9" fill="#fae8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="425" y="446" text-anchor="middle" font-size="13" font-weight="600" fill="#3b0764">Stage 3 — Vector similarity (Atlas Vector Search HNSW)</text>
  <text x="425" y="465" text-anchor="middle" font-size="11" fill="#6b21a8">generateEmbedding(cleanTag) — $vectorSearch · threshold >= 0.80</text>
  <text x="425" y="483" text-anchor="middle" font-size="11" fill="#6b21a8">"periferal" to "peripheral"  ·  "connectivity" to "network"</text>
  <text x="425" y="501" text-anchor="middle" font-size="11" fill="#64748b">Cost: ONE Gemini API call  ·  Side effect: variant added to aliases</text>
  <line x1="690" y1="468" x2="760" y2="468" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-exit)"/>
  <rect x="762" y="448" width="82" height="40" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="803" y="465" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">EXIT</text>
  <text x="803" y="479" text-anchor="middle" font-size="10" fill="#166534">if matched</text>
  <line x1="425" y1="512" x2="425" y2="532" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="435" y="526" font-size="10" fill="#94a3b8">no match</text>
  <text x="150" y="471" text-anchor="end" font-size="10" fill="#9333ea">1 API</text>
  <rect x="160" y="532" width="530" height="88" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="425" y="554" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Stage 4 — Create new tag</text>
  <text x="425" y="573" text-anchor="middle" font-size="11" fill="#166534">status: "pending"  ·  usageCount: 1</text>
  <text x="425" y="591" text-anchor="middle" font-size="11" fill="#166534">Embedding reused from Stage 3 — no second API call</text>
  <text x="425" y="609" text-anchor="middle" font-size="11" fill="#64748b">Auto-promoted to "approved" when usageCount greater than 5</text>
  <line x1="425" y1="620" x2="425" y2="640" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="150" y="584" text-anchor="end" font-size="10" fill="#16a34a">free</text>
  <rect x="160" y="640" width="530" height="44" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="425" y="658" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Resolved canonical tag returned</text>
  <text x="425" y="676" text-anchor="middle" font-size="11" fill="#166534">Stored on KB article  ·  Self-improves: aliases grow on each fuzzy/vector match</text>
</svg>