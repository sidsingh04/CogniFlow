<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 860" width="860" height="860" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="860" height="860" fill="#f8fafc" rx="12"/>
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Workflow 1 — Customer Search</text>
  <rect x="160" y="60" width="530" height="56" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="425" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#3b0764">Customer types title + description</text>
  <text x="425" y="101" text-anchor="middle" font-size="11" fill="#5b21b6">e.g. "WiFi Problem" / "my laptop keeps disconnecting"</text>
  <text x="148" y="93" text-anchor="end" font-size="11" font-weight="600" fill="#7c3aed">INPUT</text>
  <line x1="425" y1="116" x2="425" y2="136" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="136" width="530" height="56" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="425" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">node-nlp entity extraction</text>
  <text x="425" y="177" text-anchor="middle" font-size="11" fill="#166534">Scans description for emails and URLs only — no cost</text>
  <text x="148" y="169" text-anchor="end" font-size="11" font-weight="600" fill="#16a34a">1</text>
  <line x1="425" y1="192" x2="425" y2="212" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="212" width="530" height="56" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="425" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">keyword-extractor — stop word removal</text>
  <text x="425" y="253" text-anchor="middle" font-size="11" fill="#166534">Strips "my", "the", "keeps" — keeps "laptop", "disconnecting", "wifi"</text>
  <text x="148" y="245" text-anchor="end" font-size="11" font-weight="600" fill="#16a34a">2</text>
  <line x1="425" y1="268" x2="425" y2="288" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="288" width="530" height="56" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="425" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Tag DB lookup (approved tags only)</text>
  <text x="425" y="329" text-anchor="middle" font-size="11" fill="#1d4ed8">Maps signal words to canonical tags — "wifi" stays "wifi", "laptop" maps to "hardware"</text>
  <text x="148" y="321" text-anchor="end" font-size="11" font-weight="600" fill="#2563eb">3</text>
  <line x1="425" y1="344" x2="425" y2="364" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="364" width="530" height="72" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="425" y="386" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Atlas Search — field-boosted keyword retrieval</text>
  <text x="425" y="405" text-anchor="middle" font-size="11" fill="#1d4ed8">tags x4  ·  title x3  ·  description x1</text>
  <text x="425" y="422" text-anchor="middle" font-size="11" fill="#1d4ed8">Score gate >= 6  ·  Limit 50 candidates  ·  No API cost</text>
  <text x="148" y="406" text-anchor="end" font-size="11" font-weight="600" fill="#2563eb">4</text>
  <line x1="425" y1="436" x2="425" y2="456" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="456" width="530" height="56" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="425" y="478" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">Jaccard filter — cheap tag overlap gate</text>
  <text x="425" y="497" text-anchor="middle" font-size="11" fill="#92400e">Tag overlap >= 0.30 required  ·  No tags extracted: score >= 10  ·  No API cost</text>
  <text x="148" y="489" text-anchor="end" font-size="11" font-weight="600" fill="#d97706">5</text>
  <line x1="425" y1="512" x2="425" y2="532" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="532" width="530" height="56" rx="9" fill="#fae8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="425" y="554" text-anchor="middle" font-size="13" font-weight="600" fill="#3b0764">Gemini embedding — ONE API call</text>
  <text x="425" y="573" text-anchor="middle" font-size="11" fill="#6b21a8">Encodes title + description into 3072-number meaning vector</text>
  <text x="148" y="565" text-anchor="end" font-size="11" font-weight="600" fill="#9333ea">6</text>
  <line x1="425" y1="588" x2="425" y2="608" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="608" width="530" height="56" rx="9" fill="#fae8ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="425" y="630" text-anchor="middle" font-size="13" font-weight="600" fill="#3b0764">Cosine re-rank — JS math, no API</text>
  <text x="425" y="649" text-anchor="middle" font-size="11" fill="#6b21a8">blendedRelevance = atlasScore x 0.80 + cosine x 0.20</text>
  <text x="148" y="641" text-anchor="end" font-size="11" font-weight="600" fill="#9333ea">7</text>
  <line x1="425" y1="664" x2="425" y2="684" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="684" width="530" height="72" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="425" y="706" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">Confidence scorer</text>
  <text x="425" y="725" text-anchor="middle" font-size="11" fill="#92400e">score = relevance x 0.60  +  successRate x 0.25  +  recency x 0.15</text>
  <text x="425" y="744" text-anchor="middle" font-size="11" fill="#92400e">recency = e^(-0.02 x days_since_update)</text>
  <text x="148" y="725" text-anchor="end" font-size="11" font-weight="600" fill="#d97706">8</text>
  <line x1="425" y1="756" x2="425" y2="776" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="160" y="776" width="530" height="60" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="425" y="798" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Tier decision — Response</text>
  <text x="425" y="818" text-anchor="middle" font-size="11" fill="#166534">score > 0.75: top 2 articles  ·  0.5-0.75: top 5  ·  below: helpline</text>
  <text x="148" y="811" text-anchor="end" font-size="11" font-weight="600" fill="#16a34a">OUT</text>
</svg>