<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="900" height="700" fill="#f8fafc" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Workflow 5 — Feedback Loop</text>
  <rect x="60" y="60" width="320" height="52" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="220" y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#3b0764">Customer clicks feedback</text>
  <text x="220" y="99" text-anchor="middle" font-size="11" fill="#5b21b6">SupportChatModal.tsx</text>
  <rect x="520" y="60" width="320" height="52" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="680" y="81" text-anchor="middle" font-size="13" font-weight="600" fill="#3b0764">Agent clicks feedback</text>
  <text x="680" y="99" text-anchor="middle" font-size="11" fill="#5b21b6">KBSuggestionsModal.tsx</text>
  <line x1="220" y1="112" x2="220" y2="140" stroke="#64748b" stroke-width="1.3"/>
  <line x1="680" y1="112" x2="680" y2="140" stroke="#64748b" stroke-width="1.3"/>
  <line x1="220" y1="140" x2="450" y2="140" stroke="#64748b" stroke-width="1.3"/>
  <line x1="680" y1="140" x2="450" y2="140" stroke="#64748b" stroke-width="1.3"/>
  <line x1="450" y1="140" x2="450" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="230" y="160" width="440" height="52" rx="9" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="450" y="181" text-anchor="middle" font-size="13" font-weight="600" fill="#7f1d1d">PUT /api/knowledge/feedback-kb/:id</text>
  <text x="450" y="199" text-anchor="middle" font-size="11" fill="#991b1b">body: { action: "upvote" or "downvote" }</text>
  <line x1="450" y1="212" x2="450" y2="232" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="232" x2="260" y2="232" stroke="#64748b" stroke-width="1.3"/>
  <line x1="450" y1="232" x2="640" y2="232" stroke="#64748b" stroke-width="1.3"/>
  <line x1="260" y1="232" x2="260" y2="252" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="640" y1="232" x2="640" y2="252" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="248" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">upvote</text>
  <text x="570" y="248" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">downvote</text>
  <rect x="110" y="252" width="300" height="60" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="260" y="275" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">successCount + 1</text>
  <text x="260" y="293" text-anchor="middle" font-size="12" fill="#166534">usageCount + 1</text>
  <rect x="490" y="252" width="300" height="60" rx="9" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="640" y="275" text-anchor="middle" font-size="13" font-weight="600" fill="#7f1d1d">usageCount + 1</text>
  <text x="640" y="293" text-anchor="middle" font-size="11" fill="#991b1b">successCount unchanged</text>
  <line x1="260" y1="312" x2="260" y2="352" stroke="#64748b" stroke-width="1.3"/>
  <line x1="640" y1="312" x2="640" y2="352" stroke="#64748b" stroke-width="1.3"/>
  <line x1="260" y1="352" x2="450" y2="352" stroke="#64748b" stroke-width="1.3"/>
  <line x1="640" y1="352" x2="450" y2="352" stroke="#64748b" stroke-width="1.3"/>
  <line x1="450" y1="352" x2="450" y2="372" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="230" y="372" width="440" height="60" rx="9" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">successRate recalculates on next search</text>
  <text x="450" y="414" text-anchor="middle" font-size="12" fill="#92400e">successRate = successCount divided by usageCount</text>
  <line x1="450" y1="432" x2="450" y2="452" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="100" y="452" width="700" height="100" rx="9" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="476" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Confidence Formula</text>
  <text x="450" y="499" text-anchor="middle" font-size="13" fill="#1e40af">confidence = (blendedRelevance x 0.60)</text>
  <text x="450" y="519" text-anchor="middle" font-size="13" fill="#1e40af">           + (successRate x 0.25)   — feedback signal</text>
  <text x="450" y="539" text-anchor="middle" font-size="13" fill="#1e40af">           + (recency x 0.15)        — e^(-0.02 x days)</text>
  <line x1="450" y1="552" x2="450" y2="572" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="230" y="572" width="440" height="72" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="594" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Article ranking changes automatically</text>
  <text x="450" y="613" text-anchor="middle" font-size="11" fill="#166534">score &gt; 0.75: top 2 tier  ·  0.5-0.75: top 5 tier  ·  below 0.5: removed</text>
  <text x="450" y="631" text-anchor="middle" font-size="11" fill="#166534">Well-voted articles rise  ·  Unhelpful articles fade  ·  No manual curation</text>
</svg>