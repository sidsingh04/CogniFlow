  <text x="350" y="155" text-anchor="middle" font-size="11" fill="#1d4ed8">Closing review submitted</text>
  <text x="350" y="170" text-anchor="middle" font-size="11" fill="#1d4ed8">KB article created or enriched</text>
  <rect x="536" y="260" width="150" height="68" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
  <text x="611" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Article</text>
  <text x="611" y="305" text-anchor="middle" font-size="11" fill="#166534">surfaces in</text>
  <text x="611" y="320" text-anchor="middle" font-size="11" fill="#166534">future searches</text>
  <rect x="360" y="500" width="230" height="68" rx="10" fill="#fae8ff" stroke="#9333ea" stroke-width="1.8"/>
  <text x="475" y="526" text-anchor="middle" font-size="13" font-weight="600" fill="#3b0764">User votes on article</text>
