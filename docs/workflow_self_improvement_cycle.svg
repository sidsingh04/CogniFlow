<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700" width="700" height="700" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect width="700" height="700" fill="#f8fafc" rx="12"/>
  <text x="350" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">The Self-Improvement Cycle</text>
  <line x1="480" y1="185" x2="535" y2="268" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="548" y1="336" x2="508" y2="490" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="449" y1="548" x2="250" y2="548" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="192" y1="490" x2="152" y2="336" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="213" y1="268" x2="268" y2="185" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="350" y="358" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">self-improving</text>
  <text x="350" y="378" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">no curation</text>
  <text x="350" y="398" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">needed</text>
  <rect x="230" y="110" width="240" height="68" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.8"/>
