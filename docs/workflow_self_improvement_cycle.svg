  <text x="225" y="526" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">Confidence</text>
  <text x="225" y="545" text-anchor="middle" font-size="11" fill="#92400e">score recalculates</text>
  <text x="225" y="560" text-anchor="middle" font-size="11" fill="#92400e">on next search</text>
